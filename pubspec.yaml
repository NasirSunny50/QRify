name: qrify
description: QRify - Scan & Generate | QR Code & Barcode Scanner
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # QR & Barcode
  mobile_scanner: ^5.2.3
  qr_flutter: ^4.1.0
  barcode_widget: ^2.0.4

  # Storage
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3

  # UI & Utils
  flutter_animate: ^4.5.0
  share_plus: ^9.0.0
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  gal: ^1.1.0
  url_launcher: ^6.3.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#6C63FF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  web:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
